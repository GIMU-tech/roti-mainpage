      <div style="position:absolute; inset:0; border-top:1px solid rgba(226,73,60,0.4); border-bottom:1px solid rgba(226,73,60,0.4);"></div>

<script>
(function(){
  var meta = [
    {label:"01 / 04", sub:"변화하는 라이프스타일에 최적화된 가치를 제공합니다.", glow:"50% 42%"},
    {label:"02 / 04", sub:"초보 캠퍼부터 시니어 캠퍼까지, 폭넓은 캠핑 라인업.", glow:"28% 55%"},
    {label:"03 / 04", sub:"1인 가구와 신혼부부의 일상을 더 편리하게.", glow:"72% 55%"},
    {label:"04 / 04", sub:"사고 나서도, 저희가 있습니다. CS 전담 인력이 끝까지 확인합니다.", glow:"50% 50%"}
  ];
  var track = document.getElementById('riTrack');
  var count = document.getElementById('riCount');
  var sub = document.getElementById('riSub');
  var grain = document.getElementById('riGrain');
  var lines = document.querySelectorAll('.riLine');
  var lineH = 150;
  var current = 0;
  function render(i){
    track.style.transform = 'translateY(-' + (i * lineH) + 'px)';
    lines.forEach(function(l, idx){
      if(idx === i){ l.style.filter = 'blur(0px)'; l.style.opacity = '1'; }
      else { l.style.filter = 'blur(6px)'; l.style.opacity = '0.25'; }
    });
    count.textContent = meta[i].label;
    sub.style.opacity = '0';
    setTimeout(function(){ sub.textContent = meta[i].sub; sub.style.opacity = '1'; }, 500);
    document.querySelectorAll('.riSeg').forEach(function(s, idx){
      s.style.background = idx === i ? '#e2493c' : 'rgba(255,255,255,0.16)';
      s.style.width = idx === i ? '26px' : '18px';
    });
    grain.style.background = 'radial-gradient(circle at ' + meta[i].glow + ', rgba(226,73,60,0.07), transparent 55%)';
    current = i;
  }
  document.querySelectorAll('.riSeg').forEach(function(s){
    s.addEventListener('click', function(){ render(parseInt(s.dataset.i)); });
  });
  render(0);
  var auto = setInterval(function(){ render((current+1) % 4); }, 3600);
  track.closest('div').parentElement.parentElement.addEventListener('mouseenter', function(){ clearInterval(auto); });
})();
</script>
